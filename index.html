<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TACTIC AI | 智胜足球指挥系统</title>
    <style>
        :root {
            --neon-gold: #ff9800; --neon-blue: #00e5ff; --neon-red: #ff1744;
            --pitch-dark: #0a1f16; --panel-glass: rgba(15, 25, 20, 0.95);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #050a08; margin: 0; padding: 10px; font-family: 'Segoe UI', sans-serif; color: #e0e0e0; overflow-y: auto; height: 100vh; display: flex; flex-direction: column; }
        header h1 { text-align: center; font-size: 20px; letter-spacing: 2px; background: linear-gradient(135deg, #fff 30%, var(--neon-gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 5px 0; text-transform: uppercase; font-weight: 800; }
        .main-layout { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 1000px; margin: 0 auto; }
        .canvas-container { position: relative; background: #000; border-radius: 15px; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1); width: 100%; aspect-ratio: 1000 / 650; touch-action: none; }
        canvas { width: 100%; height: 100%; display: block; }
        #skillConfig { width: 100%; min-height: 120px; background: rgba(0,0,0,0.4); color: #00ffaa; border: 1px solid rgba(0,255,170,0.2); border-radius: 10px; padding: 12px; font-family: 'Consolas', monospace; font-size: 16px; resize: vertical; outline: none; }
        .control-card { background: var(--panel-glass); border-radius: 15px; padding: 12px; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        h4 { margin: 0; font-size: 13px; color: var(--neon-gold); letter-spacing: 1px; }
        .button-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        button { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #aaa; padding: 10px 2px; border-radius: 8px; cursor: pointer; font-size: 11px; transition: all 0.2s; font-weight: 600; min-height: 44px; }
        button.mode-active { background: var(--neon-gold); color: #000; border-color: transparent; box-shadow: 0 0 10px var(--neon-gold); }
        #analyzeAiBtn { grid-column: span 2; background: linear-gradient(135deg, #ff9800, #f57c00); color: #000; font-size: 13px; }
        .analysis-card { display: none; background: rgba(0, 20, 15, 0.9); border: 1px solid var(--neon-gold); max-height: 200px; overflow-y: auto; padding: 12px; }
        .analysis-card.show { display: block; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 20px; border-radius: 20px; width: 90%; max-width: 380px; border: 1px solid var(--neon-gold); }
        .ability-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .ability-item input { width: 100%; background: #222; border: 1px solid #333; color: var(--neon-gold); padding: 8px; border-radius: 8px; text-align: center; font-size: 18px; }
    </style>
</head>
<body>

<header><h1>Tactical Pro v3.3</h1></header>

<div class="main-layout">
    <div class="canvas-container"><canvas id="tacticsCanvas" width="1000" height="650"></canvas></div>
    
    <div class="side-panel">
        <div class="control-card">
            <div class="header-row">
                <h4>🧠 战术 AI 指令集</h4>
                <button id="voiceBtn" style="min-height: 30px; padding: 0 10px; background: var(--neon-blue); color: #000; font-size: 10px;">🎤 语音录入</button>
            </div>
            <textarea id="skillConfig" placeholder="指令：10号身后球找7号，7号底线倒三角..."></textarea>
        </div>

        <div class="control-card">
            <div class="button-grid">
                <button id="dragModeBtn" class="mode-active">🎮 移动</button>
                <button id="drawModeBtn">✍️ 划线</button> 
                <button id="clearLinesBtn">🗑️ 清空</button>
                <button id="resetBtn">🔄 重置</button>
                <button id="mode11v11Btn" class="mode-active">11V11</button>
                <button id="mode8v8Btn">8V8</button>
                <button id="analyzeAiBtn">▶ 启动 AI 战术引擎</button>
            </div>
        </div>

        <div class="control-card analysis-card" id="analysisPanel">
            <div id="analysisText" style="font-size: 12px; line-height: 1.6; color: #fff; font-family: 'Consolas', monospace; white-space: pre-wrap;">AI 系统待命...</div>
        </div>
    </div>
</div>

<div id="abilityModal" class="modal">
    <div class="modal-content">
        <h3 style="margin:0 0 10px 0; text-align:center; color:var(--neon-gold);">数值修改</h3>
        <div class="ability-grid">
            <div class="ability-item" style="grid-column: span 2;"><label style="font-size:11px;color:#888">号码</label><input type="number" id="numInput"></div>
            <div class="ability-item"><label>PAC</label><input type="number" id="v1"></div>
            <div class="ability-item"><label>SHO</label><input type="number" id="v2"></div>
            <div class="ability-item"><label>PAS</label><input type="number" id="v3"></div>
            <div class="ability-item"><label>DRI</label><input type="number" id="v4"></div>
            <div class="ability-item"><label>DEF</label><input type="number" id="v5"></div>
            <div class="ability-item"><label>PHY</label><input type="number" id="v6"></div>
        </div>
        <div style="display: flex; gap: 10px;"><button id="saveAbilityBtn" style="flex:2; background:var(--neon-gold); color:#000;">保存</button><button id="cancelAbilityBtn" style="flex:1; background:#333;">取消</button></div>
    </div>
</div>

<script>
(function(){
    const canvas = document.getElementById('tacticsCanvas'), ctx = canvas.getContext('2d');
    const width = 1000, height = 650;
    let players = [], lines = [], isDragging = false, draggedPlayerIndex = -1;
    let dragOffsetX = 0, dragOffsetY = 0, currentEditPlayerIndex = -1, interactionMode = 'drag'; 
    let drawingStartPlayer = null, tempMousePos = { x: 0, y: 0 }, isAiPlaying = false; 

    const colors = { gold: '#ff9800', blue: '#00e5ff', red: '#ff1744' };
    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    function getDefaultAbility() { return { v1: 75, v2: 70, v3: 72, v4: 74, v5: 65, v6: 70 }; }

    function getDefaultPlayers() {
        const list = [];
        const is8 = window.currentMatchMode === 8;
        if (is8) {
            let redPos = [{x:80,y:325},{x:250,y:150},{x:250,y:325},{x:250,y:500},{x:500,y:150},{x:500,y:325},{x:500,y:500},{x:800,y:325}];
            let bluePos = [{x:920,y:325},{x:750,y:150},{x:750,y:325},{x:750,y:500},{x:500,y:180},{x:500,y:325},{x:500,y:470},{x:200,y:325}];
            redPos.forEach((p,i)=>list.push({x:p.x,y:p.y,team:'red',label:''+(i+1),ability:getDefaultAbility()}));
            bluePos.forEach((p,i)=>list.push({x:p.x,y:p.y,team:'blue',label:''+(i+1),ability:getDefaultAbility()}));
        } else {
            let redPos = [{x:80,y:325},{x:220,y:150},{x:220,y:325},{x:220,y:500},{x:400,y:100},{x:400,y:250},{x:400,y:400},{x:400,y:550},{x:650,y:150},{x:650,y:325},{x:650,y:500}];
            let bluePos = [{x:920,y:325},{x:780,y:150},{x:780,y:325},{x:780,y:500},{x:600,y:100},{x:600,y:250},{x:600,y:400},{x:600,y:550},{x:350,y:150},{x:350,y:325},{x:350,y:500}];
            redPos.forEach((p,i)=>list.push({x:p.x,y:p.y,team:'red',label:''+(i+1),ability:getDefaultAbility()}));
            bluePos.forEach((p,i)=>list.push({x:p.x,y:p.y,team:'blue',label:''+(i+1),ability:getDefaultAbility()}));
        }
        return list;
    }

    function drawCanvas() {
        ctx.clearRect(0, 0, width, height);
        const grad = ctx.createRadialGradient(width/2, height/2, 100, width/2, height/2, 600);
        grad.addColorStop(0, '#1a472a'); grad.addColorStop(1, '#0a2113');
        ctx.fillStyle = grad; ctx.fillRect(0, 0, width, height);
        ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 2;
        ctx.strokeRect(30, 30, width-60, height-60);
        ctx.beginPath(); ctx.moveTo(width/2, 30); ctx.lineTo(width/2, height-30); ctx.stroke();
        ctx.beginPath(); ctx.arc(width/2, height/2, 80, 0, Math.PI*2); ctx.stroke();

        lines.forEach(l => {
            const f = players[l.fromIdx]; if (!f) return;
            ctx.beginPath(); ctx.moveTo(f.x, f.y);
            if (l.isShot) {
                ctx.lineTo(l.targetX, l.targetY); ctx.strokeStyle = colors.red; ctx.lineWidth = 4;
            } else {
                const t = l.toIdx !== undefined ? players[l.toIdx] : {x: l.targetX, y: l.targetY};
                ctx.lineTo(t.x, t.y); ctx.strokeStyle = colors.gold; ctx.lineWidth = 2; ctx.setLineDash([10, 5]);
            }
            ctx.stroke(); ctx.setLineDash([]);
        });

        if (interactionMode === 'draw' && drawingStartPlayer !== null) {
            ctx.beginPath(); ctx.moveTo(players[drawingStartPlayer].x, players[drawingStartPlayer].y);
            ctx.lineTo(tempMousePos.x, tempMousePos.y); ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.setLineDash([5,5]); ctx.stroke(); ctx.setLineDash([]);
        }

        players.forEach((p, idx) => {
            ctx.shadowBlur = (draggedPlayerIndex === idx) ? 30 : 15;
            ctx.shadowColor = p.team === 'red' ? 'rgba(255,23,68,0.6)' : 'rgba(0,229,255,0.6)';
            const pGrad = ctx.createLinearGradient(p.x-20, p.y-20, p.x+20, p.y+20);
            if(p.team === 'red') { pGrad.addColorStop(0, '#ff5252'); pGrad.addColorStop(1, '#b71c1c'); }
            else { pGrad.addColorStop(0, '#40c4ff'); pGrad.addColorStop(1, '#01579b'); }
            ctx.beginPath(); ctx.arc(p.x, p.y, 24, 0, Math.PI*2); ctx.fillStyle = pGrad; ctx.fill();
            ctx.strokeStyle = (drawingStartPlayer === idx) ? colors.blue : 'rgba(255,255,255,0.8)';
            ctx.lineWidth = 2; ctx.stroke();
            ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.font = 'bold 16px Arial'; ctx.textAlign = 'center'; ctx.fillText(p.label, p.x, p.y + 6);
        });
    }

    // 🌟 核心：单人平滑跑位
    function animateSinglePlayer(label, tx, ty) {
        return new Promise(resolve => {
            const pIdx = players.findIndex(p => String(p.label) === String(label) && p.team === 'red');
            if (pIdx === -1) return resolve();
            const startX = players[pIdx].x, startY = players[pIdx].y;
            const startTime = performance.now();
            const duration = 800; 

            function step(now) {
                const progress = Math.min((now - startTime) / duration, 1);
                const ease = progress < 0.5 ? 4 * progress * progress * progress : 1 - Math.pow(-2 * progress + 2, 3) / 2;
                players[pIdx].x = startX + (tx - startX) * ease;
                players[pIdx].y = startY + (ty - startY) * ease;
                drawCanvas();
                if (progress < 1) requestAnimationFrame(step); else resolve();
            }
            requestAnimationFrame(step);
        });
    }

    // 🌟 核心：全员战术初始化位移（用于动作开始前的引诱或防守回收）
    function animateAllPlayers(newPositions) {
        return new Promise(resolve => {
            const startTime = performance.now();
            const startPosMap = players.map(p => ({ x: p.x, y: p.y }));
            function step(now) {
                const progress = Math.min((now - startTime) / 800, 1);
                newPositions.forEach(target => {
                    const pIdx = players.findIndex(p => String(p.label) === String(target.label) && p.team === 'red');
                    if (pIdx !== -1) {
                        players[pIdx].x = startPosMap[pIdx].x + (target.x - startPosMap[pIdx].x) * progress;
                        players[pIdx].y = startPosMap[pIdx].y + (target.y - startPosMap[pIdx].y) * progress;
                    }
                });
                drawCanvas();
                if (progress < 1) requestAnimationFrame(step); else resolve();
            }
            requestAnimationFrame(step);
        });
    }

    async function runTacticsStepByStep(data, textDiv, btn) {
        try {
            if (data.updated_stats) {
                data.updated_stats.forEach(item => {
                    const p = players.find(p => String(p.label) === String(item.label) && p.team === 'red');
                    if (p) Object.assign(p.ability, { v1: item.stats.pac, v2: item.stats.sho, v3: item.stats.pas, v4: item.stats.dri, v5: item.stats.def, v6: item.stats.phy });
                });
            }

            textDiv.innerText = `[AI 动态推演引擎]\n${data.analysis}\n-------------------`;
            lines = [];

            // 第一步：先让全员执行战术预设站位（如回撤引诱）
            textDiv.innerText += `\n>> 初始化战术站位...`;
            await animateAllPlayers(data.new_player_data);
            await sleep(400);

            if (data.tactical_actions && data.tactical_actions.length > 0) {
                for (let i = 0; i < data.tactical_actions.length; i++) {
                    const act = data.tactical_actions[i];
                    textDiv.innerText += `\n>> 执行步骤 ${i+1}: ${act.type === 'pass' ? '精准传递' : '致命打击'}`;

                    const fromIdx = players.findIndex(p => String(p.label) === String(act.fromLabel) && p.team === 'red');

                    if (act.type === 'pass') {
                        const toIdx = players.findIndex(p => String(p.label) === String(act.toLabel) && p.team === 'red');
                        const targetPos = data.new_player_data.find(p => String(p.label) === String(act.toLabel));

                        if (fromIdx !== -1 && toIdx !== -1 && targetPos) {
                            // 🌟 线条先出，指向未来的目标点
                            lines.push({ fromIdx, toIdx, isShot: false });
                            // 🌟 重点：人球同步！接球人开始跑位
                            await animateSinglePlayer(act.toLabel, targetPos.x, targetPos.y);
                        }
                    } else if (act.type === 'shot') {
                        // 射门前，射门员跑向终结位
                        const shooterPos = data.new_player_data.find(p => String(p.label) === String(act.fromLabel));
                        if (shooterPos) {
                            await animateSinglePlayer(act.fromLabel, shooterPos.x, shooterPos.y);
                        }
                        if (fromIdx !== -1) {
                            lines.push({ fromIdx, isShot: true, targetX: act.targetX || 1000, targetY: act.targetY || 325 });
                        }
                    }
                    drawCanvas();
                    await sleep(600);
                }
            }
        } catch (e) { console.error(e); }
        finally {
            textDiv.innerText += "\n>> 推演圆满完成。";
            isAiPlaying = false; btn.disabled = false;
        }
    }

    async function analyzeWithAI() {
        if (isAiPlaying) return;
        isAiPlaying = true;
        const btn = document.getElementById('analyzeAiBtn'), textDiv = document.getElementById('analysisText');
        btn.disabled = true; document.getElementById('analysisPanel').classList.add('show');
        textDiv.innerText = ">> AI 正在深度推演战术逻辑...";

        const teamData = players.map(p => ({
            label: p.label, team: p.team === 'red' ? '红' : '蓝',
            x: Math.round(p.x), y: Math.round(p.y),
            stats: { pac: p.ability.v1, sho: p.ability.v2, pas: p.ability.v3, dri: p.ability.v4, def: p.ability.v5, phy: p.ability.v6 }
        }));

        try {
            const response = await fetch('https://soccer-api-u8yn.onrender.com/api/deepseek', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ teamData, customSkill: document.getElementById('skillConfig').value })
            });

            const reader = response.body.getReader(), decoder = new TextDecoder();
            let fullText = "";
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                fullText += decoder.decode(value, { stream: true });
                const linesArr = fullText.split('\n');
                for (const line of linesArr) {
                    if (line.startsWith('data: ')) {
                        try {
                            const data = JSON.parse(line.slice(6));
                            if (data.stage) textDiv.innerText = ">> STATUS: " + data.stage;
                            if (data.final) { await runTacticsStepByStep(data, textDiv, btn); return; }
                        } catch(e){}
                    }
                }
            }
        } catch (err) {
            textDiv.innerText = "!! 引擎故障: " + err.message;
            isAiPlaying = false; btn.disabled = false;
        }
    }

    // 交互与绑定
    canvas.addEventListener('pointerdown', (e) => {
        if (isAiPlaying) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (width / rect.width), y = (e.clientY - rect.top) * (height / rect.height);
        const idx = players.findIndex(p => Math.hypot(p.x-x, p.y-y) < 45);
        if (interactionMode === 'drag' && idx !== -1) {
            longPressTimer = setTimeout(() => {
                currentEditPlayerIndex = idx;
                document.getElementById('numInput').value = players[idx].label;
                for(let i=1; i<=6; i++) document.getElementById('v'+i).value = players[idx].ability['v'+i];
                document.getElementById('abilityModal').style.display = 'flex';
                isDragging = false;
            }, 600);
            isDragging = true; draggedPlayerIndex = idx; dragOffsetX = x - players[idx].x; dragOffsetY = y - players[idx].y;
            canvas.setPointerCapture(e.pointerId);
        } else if (interactionMode === 'draw' && idx !== -1) {
            drawingStartPlayer = idx; tempMousePos = {x, y}; canvas.setPointerCapture(e.pointerId);
        }
    });
    canvas.addEventListener('pointermove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (width / rect.width), y = (e.clientY - rect.top) * (height / rect.height);
        tempMousePos = {x, y};
        if (isDragging && interactionMode === 'drag') {
            if (Math.hypot(x - (players[draggedPlayerIndex].x + dragOffsetX), y - (players[draggedPlayerIndex].y + dragOffsetY)) > 15) clearTimeout(longPressTimer);
            players[draggedPlayerIndex].x = x - dragOffsetX; players[draggedPlayerIndex].y = y - dragOffsetY;
        }
        drawCanvas();
    });
    canvas.addEventListener('pointerup', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (width / rect.width), y = (e.clientY - rect.top) * (height / rect.height);
        if (interactionMode === 'draw' && drawingStartPlayer !== null) {
            const endIdx = players.findIndex(p => Math.hypot(p.x-x, p.y-y) < 45);
            if (endIdx !== -1 && endIdx !== drawingStartPlayer) lines.push({ fromIdx: drawingStartPlayer, toIdx: endIdx, isShot: false });
            else lines.push({ fromIdx: drawingStartPlayer, targetX: x, targetY: y, isShot: true });
        }
        drawingStartPlayer = null; clearTimeout(longPressTimer); isDragging = false; draggedPlayerIndex = -1; drawCanvas();
    });

    document.getElementById('dragModeBtn').onclick = () => { interactionMode = 'drag'; document.getElementById('dragModeBtn').classList.add('mode-active'); document.getElementById('drawModeBtn').classList.remove('mode-active'); };
    document.getElementById('drawModeBtn').onclick = () => { interactionMode = 'draw'; document.getElementById('drawModeBtn').classList.add('mode-active'); document.getElementById('dragModeBtn').classList.remove('mode-active'); };
    document.getElementById('clearLinesBtn').onclick = () => { lines = []; drawCanvas(); };
    document.getElementById('resetBtn').onclick = () => { players = getDefaultPlayers(); lines = []; drawCanvas(); };
    document.getElementById('mode8v8Btn').onclick = () => { window.currentMatchMode = 8; players = getDefaultPlayers(); lines = []; document.getElementById('mode8v8Btn').classList.add('mode-active'); document.getElementById('mode11v11Btn').classList.remove('mode-active'); drawCanvas(); };
    document.getElementById('mode11v11Btn').onclick = () => { window.currentMatchMode = 11; players = getDefaultPlayers(); lines = []; document.getElementById('mode11v11Btn').classList.add('mode-active'); document.getElementById('mode8v8Btn').classList.remove('mode-active'); drawCanvas(); };
    document.getElementById('saveAbilityBtn').onclick = () => {
        players[currentEditPlayerIndex].label = document.getElementById('numInput').value;
        for(let i=1; i<=6; i++) players[currentEditPlayerIndex].ability['v'+i] = parseInt(document.getElementById('v'+i).value || 0);
        document.getElementById('abilityModal').style.display = 'none'; drawCanvas();
    };
    document.getElementById('cancelAbilityBtn').onclick = () => document.getElementById('abilityModal').style.display = 'none';
    document.getElementById('analyzeAiBtn').onclick = analyzeWithAI;
    window.currentMatchMode = 11; players = getDefaultPlayers(); drawCanvas();
})();
</script>
</body>
</html>
