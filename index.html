<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TACTIC AI | 智胜足球指挥系统</title>
    <style>
        :root {
            --neon-gold: #ff9800;
            --neon-blue: #00e5ff;
            --neon-red: #ff1744;
            --pitch-dark: #0a1f16;
            --panel-glass: rgba(15, 25, 20, 0.95);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #050a08; margin: 0; padding: 10px; font-family: 'Segoe UI', sans-serif; color: #e0e0e0; overflow-x: hidden; }

        header h1 { 
            text-align: center; font-size: 22px; letter-spacing: 2px;
            background: linear-gradient(135deg, #fff 30%, var(--neon-gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 10px 0; text-transform: uppercase; font-weight: 800;
        }

        .main-layout { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 1200px; margin: 0 auto; }
        .canvas-container { 
            position: relative; background: #000; border-radius: 20px; overflow: hidden; 
            box-shadow: 0 0 30px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1);
            width: 100%; aspect-ratio: 1000 / 650; touch-action: none; 
        }
        canvas { width: 100%; height: 100%; display: block; cursor: crosshair; }

        .side-panel { display: flex; flex-direction: column; gap: 15px; }
        .control-card { 
            background: var(--panel-glass); border-radius: 15px; padding: 15px; 
            border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px);
        }

        h4 { margin: 0 0 10px 0; font-size: 14px; color: var(--neon-gold); letter-spacing: 1px; }

        .button-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        button { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            color: #aaa; padding: 12px 5px; border-radius: 10px; cursor: pointer; font-size: 11px;
            transition: all 0.3s; font-weight: 600;
        }
        button.mode-active { background: var(--neon-gold); color: #000; border-color: transparent; }

        #analyzeAiBtn { 
            grid-column: span 3; background: linear-gradient(135deg, #ff9800, #f57c00); 
            color: #000; font-size: 14px; margin-top: 5px;
        }

        #skillConfig { 
            width: 100%; height: 80px; background: rgba(0,0,0,0.3); color: #00ffaa; 
            border: 1px solid rgba(0,255,170,0.2); border-radius: 10px; padding: 12px; 
            font-family: 'Consolas', monospace; font-size: 13px; resize: none; outline: none;
        }

        .analysis-card { 
            display: none; background: rgba(0, 20, 15, 0.9); border: 1px solid var(--neon-gold); 
            max-height: 300px; overflow-y: auto; padding: 15px;
        }
        .analysis-card.show { display: block; }

        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(15px); z-index: 2000; justify-content: center; align-items: center; 
        }
        .modal-content { 
            background: #111; padding: 25px; border-radius: 20px; width: 90%; max-width: 380px; 
            border: 1px solid var(--neon-gold);
        }
        .ability-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
        .ability-item input { width: 100%; background: #222; border: 1px solid #333; color: var(--neon-gold); padding: 8px; border-radius: 6px; text-align: center; }
    </style>
</head>
<body>

<header><h1>Tactical Terminal v2.6</h1></header>

<div class="main-layout">
    <div class="canvas-container"><canvas id="tacticsCanvas" width="1000" height="650"></canvas></div>
    
    <div class="side-panel">
        <div class="control-card">
            <h4>🧠 战术指令录入 (Direct Input)</h4>
            <textarea id="skillConfig" placeholder="指令示例：让 7 号像贝尔一样在边路超车..."></textarea>
        </div>

        <div class="control-card">
            <div class="button-grid">
                <button id="mode11v11Btn" class="mode-active">11 VS 11</button>
                <button id="mode8v8Btn">8 VS 8</button>
                <button id="resetBtn">RESET</button>
                <button id="dragModeBtn" class="mode-active">MOVE</button>
                <button id="clearLinesBtn">CLEAR</button>
                <button id="closeAnalysisBtn">HIDE INFO</button>
                <button id="analyzeAiBtn">▶ 启动 AI 战术推演引擎</button>
            </div>
        </div>

        <div class="control-card analysis-card" id="analysisPanel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid rgba(255,152,0,0.2); padding-bottom: 8px;">
                <h4 style="margin:0;">SYSTEM REPORT</h4>
            </div>
            <div id="analysisText" style="font-size: 13px; line-height: 1.8; color: #fff; font-family: 'Consolas', monospace; white-space: pre-wrap;">Waiting for input...</div>
        </div>
    </div>
</div>

<div id="abilityModal" class="modal">
    <div class="modal-content">
        <h3 style="margin:0 0 15px 0; text-align:center; color:var(--neon-gold);">UNIT SPECIFICATION</h3>
        <div style="margin-bottom:15px;">
            <label style="font-size:12px; color:#888;">IDENTIFIER (NO.)</label>
            <input type="number" id="numInput">
        </div>
        <div class="ability-grid">
            <div class="ability-item"><label>PAC 速度</label><input type="number" id="v1"></div>
            <div class="ability-item"><label>SHO 射门</label><input type="number" id="v2"></div>
            <div class="ability-item"><label>PAS 传球</label><input type="number" id="v3"></div>
            <div class="ability-item"><label>DRI 盘带</label><input type="number" id="v4"></div>
            <div class="ability-item"><label>DEF 防守</label><input type="number" id="v5"></div>
            <div class="ability-item"><label>PHY 体能</label><input type="number" id="v6"></div>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button id="saveAbilityBtn" style="flex:2; background:var(--neon-gold); color:#000;">CONFIRM</button>
            <button id="cancelAbilityBtn" style="flex:1; background:#333; color:#fff;">EXIT</button>
        </div>
    </div>
</div>

<script>
(function(){
    const canvas = document.getElementById('tacticsCanvas'), ctx = canvas.getContext('2d');
    const width = 1000, height = 650;
    let players = [], lines = [], isDragging = false, draggedPlayerIndex = -1;
    let dragOffsetX = 0, dragOffsetY = 0, currentEditPlayerIndex = -1;
    let lastTapTime = 0, lastTapPlayerIdx = -1;
    let isAiPlaying = false; 
    let currentMatchMode = 11; 

    // 🌟 修复：JS 获取 CSS 变量颜色
    const colors = {
        gold: '#ff9800',
        blue: '#00e5ff',
        red: '#ff1744'
    };

    function getDefaultAbility() { return { v1: 75, v2: 70, v3: 72, v4: 74, v5: 65, v6: 70 }; }

    function getDefaultPlayers() {
        const list = [];
        if (currentMatchMode === 11) {
            let redPos = [{x:80,y:325},{x:220,y:150},{x:220,y:325},{x:220,y:500},{x:400,y:100},{x:400,y:250},{x:400,y:400},{x:400,y:550},{x:650,y:150},{x:650,y:325},{x:650,y:500}];
            let bluePos = [{x:920,y:325},{x:780,y:150},{x:780,y:325},{x:780,y:500},{x:600,y:100},{x:600,y:250},{x:600,y:400},{x:600,y:550},{x:350,y:150},{x:350,y:325},{x:350,y:500}];
            redPos.forEach((p,i)=>list.push({x:p.x,y:p.y,team:'red',label:''+(i+1),ability:getDefaultAbility()}));
            bluePos.forEach((p,i)=>list.push({x:p.x,y:p.y,team:'blue',label:''+(i+1),ability:getDefaultAbility()}));
        } else {
            let redPos = [{x:80,y:325},{x:250,y:150},{x:250,y:325},{x:250,y:500},{x:500,y:150},{x:500,y:325},{x:500,y:500},{x:800,y:325}];
            let bluePos = [{x:920,y:325},{x:750,y:150},{x:750,y:325},{x:750,y:500},{x:500,y:180},{x:500,y:325},{x:500,y:470},{x:200,y:325}];
            redPos.forEach((p,i)=>list.push({x:p.x,y:p.y,team:'red',label:''+(i+1),ability:getDefaultAbility()}));
            bluePos.forEach((p,i)=>list.push({x:p.x,y:p.y,team:'blue',label:''+(i+1),ability:getDefaultAbility()}));
        }
        return list;
    }

    function getRole(x, team) {
        if (team === 'red') return x < 120 ? 'GK' : x < 320 ? 'DEF' : x < 550 ? 'MID' : 'FWD';
        return x > 880 ? 'GK' : x > 680 ? 'DEF' : x > 450 ? 'MID' : 'FWD';
    }

    function drawCanvas() {
        ctx.clearRect(0, 0, width, height);
        const grad = ctx.createRadialGradient(width/2, height/2, 100, width/2, height/2, 600);
        grad.addColorStop(0, '#1a472a'); grad.addColorStop(1, '#0a2113');
        ctx.fillStyle = grad; ctx.fillRect(0, 0, width, height);
        ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 2;
        ctx.strokeRect(30, 30, width-60, height-60);
        ctx.beginPath(); ctx.moveTo(width/2, 30); ctx.lineTo(width/2, height-30); ctx.stroke();
        ctx.beginPath(); ctx.arc(width/2, height/2, 80, 0, Math.PI*2); ctx.stroke();

        lines.forEach(l => {
            const f = players[l.fromIdx]; if (!f) return;
            ctx.shadowBlur = 15;
            ctx.beginPath(); ctx.moveTo(f.x, f.y);
            if (l.isShot) {
                ctx.lineTo(l.targetX, l.targetY); ctx.strokeStyle = colors.red; ctx.lineWidth = 4; ctx.shadowColor = colors.red;
            } else {
                const t = players[l.toIdx]; if(!t) return;
                ctx.lineTo(t.x, t.y); ctx.strokeStyle = colors.gold; ctx.lineWidth = 2; ctx.shadowColor = colors.gold; ctx.setLineDash([10, 5]);
            }
            ctx.stroke(); ctx.setLineDash([]); ctx.shadowBlur = 0;
        });

        players.forEach(p => {
            ctx.shadowBlur = 15; ctx.shadowColor = p.team === 'red' ? 'rgba(255,23,68,0.4)' : 'rgba(0,229,255,0.4)';
            const pGrad = ctx.createLinearGradient(p.x-20, p.y-20, p.x+20, p.y+20);
            if(p.team === 'red') { pGrad.addColorStop(0, '#ff5252'); pGrad.addColorStop(1, '#b71c1c'); }
            else { pGrad.addColorStop(0, '#40c4ff'); pGrad.addColorStop(1, '#01579b'); }
            ctx.beginPath(); ctx.arc(p.x, p.y, 24, 0, Math.PI*2); ctx.fillStyle = pGrad; ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.lineWidth = 2; ctx.stroke();
            ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.font = 'bold 16px Arial'; ctx.textAlign = 'center'; ctx.fillText(p.label, p.x, p.y + 6);
            ctx.font = '9px Arial'; ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.fillText(getRole(p.x, p.team), p.x, p.y - 32);
        });
    }

    function animatePlayersTo(newPositions, onComplete) {
        const startTime = performance.now();
        const startPosMap = players.map(p => ({ x: p.x, y: p.y }));
        function step(now) {
            const progress = Math.min((now - startTime) / 1200, 1);
            const ease = progress < 0.5 ? 4 * progress * progress * progress : 1 - Math.pow(-2 * progress + 2, 3) / 2;
            newPositions.forEach(target => {
                const pIdx = players.findIndex(p => String(p.label) === String(target.label) && p.team === 'red');
                if (pIdx !== -1) {
                    players[pIdx].x = startPosMap[pIdx].x + (Math.max(50, Math.min(950, target.x)) - startPosMap[pIdx].x) * ease;
                    players[pIdx].y = startPosMap[pIdx].y + (Math.max(50, Math.min(600, target.y)) - startPosMap[pIdx].y) * ease;
                }
            });
            drawCanvas();
            if (progress < 1) requestAnimationFrame(step);
            else if (onComplete) onComplete();
        }
        requestAnimationFrame(step);
    }

    async function analyzeWithAI() {
        if (isAiPlaying) return;
        isAiPlaying = true;
        const btn = document.getElementById('analyzeAiBtn');
        const textDiv = document.getElementById('analysisText');
        btn.disabled = true;
        document.getElementById('analysisPanel').classList.add('show');
        textDiv.innerText = ">> INITIALIZING AI CORE...\n>> ANALYZING PITCH GEOMETRY...";

        const teamData = players.map(p => ({
            label: p.label, team: p.team === 'red' ? '红' : '蓝',
            x: Math.round(p.x), y: Math.round(p.y),
            role: getRole(p.x, p.team),
            stats: { pac: p.ability.v1, sho: p.ability.v2, pas: p.ability.v3, dri: p.ability.v4, def: p.ability.v5, phy: p.ability.v6 }
        }));

        try {
            const response = await fetch('https://soccer-api-u8yn.onrender.com/api/deepseek', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ teamData, customSkill: document.getElementById('skillConfig').value })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        try {
                            const data = JSON.parse(line.slice(6));
                            if (data.stage) textDiv.innerText += "\n>> " + data.stage;
                            if (data.final) handleFinalAction(data, textDiv, btn);
                        } catch(e){}
                    }
                }
            }
        } catch (err) {
            textDiv.innerText = "!! CRITICAL ERROR: " + err.message;
            isAiPlaying = false; btn.disabled = false;
        }
    }

    function handleFinalAction(data, textDiv, btn) {
        if (data.updated_stats) {
            data.updated_stats.forEach(item => {
                const p = players.find(player => String(player.label) === String(item.label) && player.team === 'red');
                if (p) Object.assign(p.ability, { v1: item.stats.pac, v2: item.stats.sho, v3: item.stats.pas, v4: item.stats.dri, v5: item.stats.def, v6: item.stats.phy });
            });
        }
        textDiv.innerText = `[AI TACTICAL REPORT]\n-------------------\n${data.analysis}`;
        lines = [];
        animatePlayersTo(data.new_player_data, () => {
            if (data.tactical_actions && data.tactical_actions.length > 0) {
                data.tactical_actions.forEach((act, idx) => {
                    setTimeout(() => {
                        const fIdx = players.findIndex(p => String(p.label) === String(act.fromLabel) && p.team === 'red');
                        if (act.type === 'pass') {
                            const tIdx = players.findIndex(p => String(p.label) === String(act.toLabel) && p.team === 'red');
                            if (fIdx !== -1 && tIdx !== -1) lines.push({ fromIdx: fIdx, toIdx: tIdx, isShot: false });
                        } else if (act.type === 'shot') {
                            if (fIdx !== -1) lines.push({ fromIdx: fIdx, isShot: true, targetX: act.targetX, targetY: act.targetY });
                        }
                        drawCanvas();
                        if (idx === data.tactical_actions.length - 1) { isAiPlaying = false; btn.disabled = false; }
                    }, idx * 600);
                });
            } else { isAiPlaying = false; btn.disabled = false; }
        });
    }

    canvas.onmousedown = canvas.ontouchstart = (e) => {
        if (isAiPlaying) return;
        const rect = canvas.getBoundingClientRect();
        const cx = (e.touches ? e.touches[0].clientX : e.clientX), cy = (e.touches ? e.touches[0].clientY : e.clientY);
        const x = (cx - rect.left) * (width / rect.width), y = (cy - rect.top) * (height / rect.height);
        const idx = players.findIndex(p => Math.hypot(p.x-x, p.y-y) < 30);
        
        if (idx !== -1 && (Date.now() - lastTapTime < 300) && lastTapPlayerIdx === idx) {
            currentEditPlayerIndex = idx;
            document.getElementById('numInput').value = players[idx].label;
            for(let i=1; i<=6; i++) document.getElementById('v'+i).value = players[idx].ability['v'+i];
            document.getElementById('abilityModal').style.display = 'flex';
            return;
        }
        lastTapTime = Date.now(); lastTapPlayerIdx = idx;
        if (idx !== -1) { isDragging = true; draggedPlayerIndex = idx; dragOffsetX = x - players[idx].x; dragOffsetY = y - players[idx].y; }
    };

    window.onmousemove = window.ontouchmove = (e) => {
        if (!isDragging) return;
        const rect = canvas.getBoundingClientRect();
        const cx = (e.touches ? e.touches[0].clientX : e.clientX), cy = (e.touches ? e.touches[0].clientY : e.clientY);
        players[draggedPlayerIndex].x = (cx - rect.left) * (width / rect.width) - dragOffsetX;
        players[draggedPlayerIndex].y = (cy - rect.top) * (height / rect.height) - dragOffsetY;
        drawCanvas();
    };

    window.onmouseup = window.ontouchend = () => isDragging = false;
    
    document.getElementById('mode8v8Btn').onclick = () => {
        currentMatchMode = 8; players = getDefaultPlayers(); lines = []; drawCanvas();
        document.getElementById('mode8v8Btn').classList.add('mode-active');
        document.getElementById('mode11v11Btn').classList.remove('mode-active');
    };
    document.getElementById('mode11v11Btn').onclick = () => {
        currentMatchMode = 11; players = getDefaultPlayers(); lines = []; drawCanvas();
        document.getElementById('mode11v11Btn').classList.add('mode-active');
        document.getElementById('mode8v8Btn').classList.remove('mode-active');
    };
    document.getElementById('saveAbilityBtn').onclick = () => {
        players[currentEditPlayerIndex].label = document.getElementById('numInput').value;
        for(let i=1; i<=6; i++) players[currentEditPlayerIndex].ability['v'+i] = parseInt(document.getElementById('v'+i).value || 0);
        document.getElementById('abilityModal').style.display = 'none'; drawCanvas();
    };
    document.getElementById('cancelAbilityBtn').onclick = () => document.getElementById('abilityModal').style.display = 'none';
    document.getElementById('analyzeAiBtn').onclick = analyzeWithAI;
    document.getElementById('resetBtn').onclick = () => { players = getDefaultPlayers(); lines = []; drawCanvas(); };
    document.getElementById('clearLinesBtn').onclick = () => { lines = []; drawCanvas(); };
    document.getElementById('closeAnalysisBtn').onclick = () => document.getElementById('analysisPanel').classList.toggle('show');

    players = getDefaultPlayers(); drawCanvas();
})();
</script>
</body>
</html>
